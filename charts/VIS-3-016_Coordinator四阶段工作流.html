<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIS-3-016 Coordinator 四阶段工作流</title>
<style>
  :root[data-theme="dark"]  {--bg:#0f172a;--panel:#1e293b;--card:#1e293b;--border:rgba(255,255,255,.08);--text:#f1f5f9;--muted:#94a3b8;--subtle:#334155;}
  :root[data-theme="warm"]  {--bg:#1c1917;--panel:#292524;--card:#292524;--border:rgba(255,255,255,.08);--text:#f5f0eb;--muted:#a8a29e;--subtle:#3c3835;}
  :root[data-theme="light"] {--bg:#f8fafc;--panel:#ffffff;--card:#f1f5f9;--border:rgba(0,0,0,.08);--text:#0f172a;--muted:#64748b;--subtle:#e2e8f0;}
  :root{--amber:#f59e0b;--cyan:#22d3ee;--violet:#8b5cf6;--emerald:#10b981;--rose:#f43f5e;--slate:#64748b;--orange:#f97316;}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;transition:background .3s,color .3s;}

  .page{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:24px 16px 40px;}

  /* ── header ── */
  .header{width:100%;max-width:960px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:24px;}
  .header-left{display:flex;flex-direction:column;gap:4px;}
  .vis-id{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--rose);text-transform:uppercase;}
  .title-zh{font-size:22px;font-weight:700;line-height:1.25;color:var(--text);}
  .title-en{font-size:13px;color:var(--muted);margin-top:2px;}
  .controls{display:flex;gap:8px;flex-shrink:0;margin-top:4px;}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:border-color .2s,color .2s;}
  .btn:hover{border-color:var(--rose);color:var(--text);}

  /* ── svg container ── */
  .viz-wrap{width:100%;max-width:960px;background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;}
  .viz-wrap svg{display:block;width:100%;height:auto;}

  /* ── svg shared styles ── */
  .coord-bar{fill:rgba(244,63,94,.12);stroke:var(--rose);stroke-width:1.5;}
  .coord-label{fill:var(--rose);font-family:inherit;}
  .phase-box{fill:none;stroke-width:1.5;rx:10;}
  .phase-bg{opacity:.07;}
  .connector{stroke-dasharray:4 3;stroke-width:1.2;opacity:.6;}
  .flow-arrow{fill:none;stroke-width:2;stroke-linecap:round;}
  .arrow-head{stroke:none;}
  .num-circle{stroke:none;r:12;}
  .num-text{font-weight:700;fill:#fff;font-size:12px;dominant-baseline:central;text-anchor:middle;}
  .phase-title-zh{font-size:13px;font-weight:700;dominant-baseline:central;}
  .phase-title-en{font-size:11px;dominant-baseline:central;opacity:.7;}
  .worker-pill{rx:8;ry:8;height:22px;opacity:.18;}
  .worker-text{font-size:10px;font-weight:600;dominant-baseline:central;text-anchor:middle;}
  .output-label-zh{font-size:10px;font-weight:600;dominant-baseline:central;}
  .output-label-en{font-size:10px;dominant-baseline:central;opacity:.75;}
  .output-box{rx:6;ry:6;opacity:.15;height:26px;}
  .stat-box{rx:10;ry:10;fill:var(--subtle,#334155);}
  .stat-num{font-size:18px;font-weight:800;dominant-baseline:central;text-anchor:middle;}
  .stat-label-zh{font-size:11px;dominant-baseline:central;text-anchor:middle;}
  .stat-label-en{font-size:10px;dominant-baseline:central;text-anchor:middle;opacity:.7;}

  /* ── animation ── */
  @keyframes flowPulse{0%{stroke-dashoffset:16}100%{stroke-dashoffset:0}}
  .flow-animated{stroke-dasharray:6 3;animation:flowPulse 1.4s linear infinite;}
  @keyframes dotSlide{0%{opacity:0;transform:translateX(0)}50%{opacity:1}100%{opacity:0;transform:translateX(28px)}}
  .flow-dot{animation:dotSlide 1.6s ease-in-out infinite;}
  .flow-dot-2{animation-delay:.53s;}
  .flow-dot-3{animation-delay:1.07s;}

  /* ── responsive ── */
  @media(max-width:600px){.title-zh{font-size:17px;}.controls{flex-direction:column;gap:6px;}}
</style>
<script>
(function(){
  var t=localStorage.getItem('vtheme')||'dark';
  var l=localStorage.getItem('vlang')||'zh';
  document.documentElement.setAttribute('data-lang', l);
  document.documentElement.setAttribute('data-theme',t);
  function applyLang(){
    document.querySelectorAll('.lz').forEach(function(e){var hide=l==='en';e.style.display=hide?'none':'';if(e.tagName==='text'||e.closest('svg'))e.setAttribute('display',hide?'none':'');});
    document.querySelectorAll('.le').forEach(function(e){var show=l==='en';e.style.display=show?'':'none';if(e.tagName==='text'||e.closest('svg'))e.setAttribute('display',show?'':'none');});
  }
  applyLang();
  window.cycleTheme=function(){var ts=['dark','warm','light'];var i=ts.indexOf(document.documentElement.getAttribute('data-theme'));t=ts[(i+1)%3];document.documentElement.setAttribute('data-theme',t);localStorage.setItem('vtheme',t);};
  window.toggleLang=function(){l=l==='zh'?'en':'zh';localStorage.setItem('vlang',l);applyLang();};
})();
</script>
</head>

<script>
/* v2-embed-sync */
/* Embed-mode sync v2: 当图表作为 iframe 嵌入时，隐藏自带控件，跟父页面总开关联动。
   监听 3 种父页面 message 格式：cc-theme / cc-lang / v2-sync */
(function(){
  try {
    var params = new URLSearchParams(window.location.search);
    var isEmbed = params.get('embed') === '1';
    var theme = params.get('theme');
    var lang = params.get('lang');
    function forceLang(l) {
      // 直接翻转 .lz / .le 元素的显示，绕过图表 IIFE 的闭包 l 变量
      var en = l === 'en';
      document.querySelectorAll('.lz').forEach(function(e){
        e.style.display = en ? 'none' : '';
        if (e.tagName && (e.tagName.toLowerCase() === 'text' || e.tagName === 'tspan' || e.closest('svg'))) {
          if (en) e.setAttribute('display', 'none'); else e.removeAttribute('display');
        }
      });
      document.querySelectorAll('.le').forEach(function(e){
        e.style.display = en ? '' : 'none';
        if (e.tagName && (e.tagName.toLowerCase() === 'text' || e.tagName === 'tspan' || e.closest('svg'))) {
          if (en) e.removeAttribute('display'); else e.setAttribute('display', 'none');
        }
      });
    }
    function applyState(t, l) {
      if (t) {
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem('vtheme', t); localStorage.setItem('cc-theme', t); } catch(_){}
      }
      if (l) {
        document.documentElement.setAttribute('data-lang', l);
        document.documentElement.setAttribute('lang', l);  // 双写，让 CSS 的 html[lang=*] 也命中
        try { ['vlang','cc-lang','cc-locale','lang'].forEach(function(k){ localStorage.setItem(k, l); }); } catch(_){}
        forceLang(l);  // 直接操作 .lz/.le，跳过 IIFE 闭包问题
      }
    }
    if (isEmbed) {
      applyState(theme, lang);
      // FM-23 防御：一些图表用 createElement 晚期注入 .lz/.le 节点
      setTimeout(function(){ applyState(theme, lang); }, 100);
      setTimeout(function(){ applyState(theme, lang); }, 500);
      var hideCSS = document.createElement('style');
      hideCSS.textContent = [
        '[onclick*="toggleLang"],',
        '[onclick*="setTheme"],',
        '[onclick*="toggleTheme"],',
        '[onclick*="cycleTheme"],',
        '.controls,',
        '.theme-controls,',
        '.topbar-controls,',
        '.chart-controls,',
        '.viz-controls,',
        '.ctrl-row,',
        '.ctrls,',
        '.toolbar .btn {',
        '  display: none !important;',
        '}'
      ].join('');
      hideCSS.id = 'v2-embed-sync-hide';
      (document.head || document.documentElement).appendChild(hideCSS);
    }
    window.addEventListener('message', function(e){
      if (!e.data || typeof e.data !== 'object') return;
      var d = e.data;
      if (d.type === 'v2-sync') { applyState(d.theme, d.lang); }
      else if (d.type === 'cc-theme') { applyState(d.theme, null); }
      else if (d.type === 'cc-lang') { applyState(null, d.lang); }
    });
  } catch(err) { /* ignore */ }
})();
</script>
