<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" width="800" height="680">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#bc8cff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d29922"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f85149"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowBlue">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#58a6ff" flood-opacity="0.25"/>
    </filter>
    <filter id="glowGreen">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3fb950" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="loopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="680" fill="#0d1117" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="80" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="40" width="800" height="40" fill="url(#headerGrad)"/>
  <text x="400" y="38" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Agent Loop Flow</text>
  <text x="400" y="62" fill="#8b949e" font-size="13" text-anchor="middle">Claude Code Query Execution Cycle</text>

  <!-- ==================== ROW 1: User Input ==================== -->
  <g filter="url(#glowBlue)">
    <rect x="310" y="105" width="180" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  </g>
  <text x="400" y="134" fill="#58a6ff" font-size="15" font-weight="700" text-anchor="middle">User Input</text>

  <!-- Arrow: User Input -> Build System Prompt -->
  <line x1="400" y1="153" x2="400" y2="190" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ==================== ROW 2: Build System Prompt ==================== -->
  <g filter="url(#shadow)">
    <rect x="280" y="198" width="240" height="48" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  </g>
  <text x="400" y="227" fill="#d2a8ff" font-size="14" font-weight="600" text-anchor="middle">Build System Prompt</text>

  <!-- Arrow: Build System Prompt -> Call Claude API -->
  <line x1="400" y1="246" x2="400" y2="283" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ==================== ROW 3: Call Claude API ==================== -->
  <!-- This is the re-entry point for the loop -->
  <g filter="url(#shadow)">
    <rect x="280" y="291" width="240" height="48" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  </g>
  <text x="400" y="320" fill="#d2a8ff" font-size="14" font-weight="600" text-anchor="middle">Call Claude API</text>
  <!-- Small loop-back indicator -->
  <circle cx="280" cy="315" r="4" fill="#3fb950" opacity="0.8"/>

  <!-- Arrow: Call Claude API -> Parse Response -->
  <line x1="400" y1="339" x2="400" y2="376" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ==================== ROW 4: Parse Response ==================== -->
  <g filter="url(#shadow)">
    <rect x="280" y="384" width="240" height="48" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
  </g>
  <text x="400" y="413" fill="#d2a8ff" font-size="14" font-weight="600" text-anchor="middle">Parse Response</text>

  <!-- Arrow: Parse Response -> Decision Diamond -->
  <line x1="400" y1="432" x2="400" y2="462" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ==================== ROW 5: Decision Diamond ==================== -->
  <polygon points="400,465 480,500 400,535 320,500" fill="#161b22" stroke="#d29922" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="496" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">Has Tool</text>
  <text x="400" y="511" fill="#d29922" font-size="12" font-weight="700" text-anchor="middle">Calls?</text>

  <!-- ==================== YES Branch (LEFT): Execute Tools ==================== -->
  <!-- Arrow: Diamond -> Execute Tools (left) -->
  <path d="M320,500 L180,500" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="250" y="492" fill="#3fb950" font-size="12" font-weight="600">Yes</text>

  <!-- Execute Tools box -->
  <g filter="url(#glowGreen)">
    <rect x="60" y="476" width="120" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  </g>
  <text x="120" y="505" fill="#56d364" font-size="13" font-weight="600" text-anchor="middle">Execute Tools</text>

  <!-- Arrow: Execute Tools -> Collect Results (up) -->
  <line x1="120" y1="476" x2="120" y2="421" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Collect Results box -->
  <g filter="url(#shadow)">
    <rect x="60" y="373" width="120" height="48" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  </g>
  <text x="120" y="402" fill="#56d364" font-size="13" font-weight="600" text-anchor="middle">Collect Results</text>

  <!-- Arrow: Collect Results -> Call Claude API (curved loop-back) -->
  <path d="M120,373 L120,315 L272,315" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>

  <!-- Loop-back label -->
  <rect x="130" y="300" width="90" height="20" rx="4" fill="#3fb95015"/>
  <text x="175" y="314" fill="#3fb950" font-size="10" font-weight="600" text-anchor="middle">Re-enter loop</text>

  <!-- ==================== NO Branch (RIGHT): Final Response ==================== -->
  <!-- Arrow: Diamond -> Final Response (right) -->
  <path d="M480,500 L600,500" fill="none" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="540" y="492" fill="#f85149" font-size="12" font-weight="600">No</text>

  <!-- Final Response box -->
  <g filter="url(#shadow)">
    <rect x="600" y="476" width="140" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  </g>
  <text x="670" y="505" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle">Final Response</text>

  <!-- Arrow: Final Response -> back to User Input (curved) -->
  <path d="M740,500 L760,500 Q780,500 780,480 L780,129 Q780,109 760,109 L498,109" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="770" y="310" fill="#58a6ff" font-size="10" font-weight="500" text-anchor="middle" writing-mode="tb">Return to user</text>

  <!-- ==================== Legend ==================== -->
  <rect x="50" y="575" width="700" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="600" fill="#e6edf3" font-size="13" font-weight="600">Legend</text>

  <!-- Blue = Input/Output -->
  <rect x="80" y="616" width="16" height="16" rx="4" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="104" y="629" fill="#8b949e" font-size="11">Input / Output</text>

  <!-- Purple = AI Processing -->
  <rect x="230" y="616" width="16" height="16" rx="4" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="254" y="629" fill="#8b949e" font-size="11">AI Processing</text>

  <!-- Green = Tool Execution -->
  <rect x="400" y="616" width="16" height="16" rx="4" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="424" y="629" fill="#8b949e" font-size="11">Tool Execution</text>

  <!-- Orange = Decision -->
  <polygon points="570,624 578,616 586,624 578,632" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="596" y="629" fill="#8b949e" font-size="11">Decision</text>

  <!-- Dashed = Loop path -->
  <line x1="680" y1="624" x2="720" y2="624" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="680" y="646" fill="#8b949e" font-size="11">Loop / Return</text>
</svg>