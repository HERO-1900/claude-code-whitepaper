<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="800" height="820">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.12"/>
    </linearGradient>
    <!-- Layer background gradients -->
    <linearGradient id="layer1Bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#388bfd" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="layer2Bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d2a8ff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="layer3Bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#56d364" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="layer4Bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d29922" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d29922" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="layer5Bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f85149" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f85149" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="820" fill="#0d1117" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="80" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="40" width="800" height="40" fill="url(#headerGrad)"/>
  <text x="400" y="38" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Claude Code Architecture</text>
  <text x="400" y="62" fill="#8b949e" font-size="13" text-anchor="middle">Layered Module Map</text>

  <!-- ==================== LAYER 1: CLI Entry Points ==================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="720" height="120" rx="10" fill="url(#layer1Bg)" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  <!-- Layer label -->
  <rect x="40" y="100" width="6" height="120" rx="3" fill="#58a6ff"/>
  <text x="68" y="123" fill="#58a6ff" font-size="13" font-weight="700">CLI ENTRY POINTS</text>
  <text x="68" y="140" fill="#8b949e" font-size="11">commands/ , cli/</text>

  <!-- Module boxes inside -->
  <rect x="68" y="155" width="90" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="113" y="176" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">main.ts</text>

  <rect x="170" y="155" width="110" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="225" y="176" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">cli/index.ts</text>

  <rect x="292" y="155" width="100" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="342" y="176" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">/doctor</text>

  <rect x="404" y="155" width="100" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="454" y="176" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">/config</text>

  <rect x="516" y="155" width="100" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="566" y="176" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">/review</text>

  <rect x="628" y="155" width="110" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="683" y="176" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">/init  /login</text>

  <!-- Downward connector -->
  <line x1="400" y1="220" x2="400" y2="240" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ==================== LAYER 2: Core Engine ==================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="240" width="720" height="120" rx="10" fill="url(#layer2Bg)" stroke="#bc8cff" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  <rect x="40" y="240" width="6" height="120" rx="3" fill="#bc8cff"/>
  <text x="68" y="263" fill="#bc8cff" font-size="13" font-weight="700">CORE ENGINE</text>
  <text x="68" y="280" fill="#8b949e" font-size="11">Agent orchestration, query cycle, prompt assembly</text>

  <rect x="68" y="295" width="130" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="133" y="316" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">queryLoop.ts</text>

  <rect x="210" y="295" width="130" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="316" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">Agent Class</text>

  <rect x="352" y="295" width="140" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="422" y="316" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">System Prompt</text>

  <rect x="504" y="295" width="120" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="564" y="316" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">API Client</text>

  <rect x="636" y="295" width="106" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="689" y="316" fill="#e6edf3" font-size="11" font-weight="600" text-anchor="middle">Messages</text>

