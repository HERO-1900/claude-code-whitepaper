<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      .title { fill: #ffffff; font-size: 22px; font-weight: 700; text-anchor: middle; }
      .subtitle { fill: #888; font-size: 13px; text-anchor: middle; }
      .stage-box { stroke-width: 1.5; }
      .stage-title { fill: #fff; font-size: 16px; font-weight: 700; }
      .stage-desc { fill: rgba(255,255,255,0.82); font-size: 12px; }
      .data-bar { rx: 3; ry: 3; }
      .threshold-line { stroke-dasharray: 6,3; stroke-width: 1.5; }
      .threshold-label { font-size: 12px; font-weight: 600; }
    </style>
    <marker id="flowArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#666"/>
    </marker>
    <marker id="flowArrActive" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#00d4ff"/>
    </marker>
    <linearGradient id="dataGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
    <linearGradient id="dataGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9f43"/>
      <stop offset="100%" stop-color="#ffd93d"/>
    </linearGradient>
    <linearGradient id="dataGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#48bb78"/>
    </linearGradient>
    <linearGradient id="dataGrad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#48bb78"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#12121a"/>

  <text x="400" y="38" class="title">Context Compression Pipeline</text>
  <text x="400" y="56" class="subtitle">4-stage pipeline to manage context window utilization</text>

  <!-- Threshold gauge on the right side -->
  <rect x="680" y="80" width="100" height="440" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="730" y="100" fill="#e0e0e0" font-size="13" font-weight="700" text-anchor="middle" style="font-family:sans-serif">Context Window</text>
  <text x="730" y="114" fill="#666" font-size="12" text-anchor="middle" style="font-family:sans-serif">200K tokens</text>

  <!-- Gauge bar background -->
  <rect x="710" y="125" width="40" height="380" rx="4" fill="#222"/>

  <!-- Gauge fill (showing ~85% full) -->
  <rect x="710" y="182" width="40" height="323" rx="4" fill="#ff6b6b" opacity="0.3"/>
  <rect x="710" y="260" width="40" height="245" rx="4" fill="#ffd93d" opacity="0.3"/>
  <rect x="710" y="370" width="40" height="135" rx="4" fill="#48bb78" opacity="0.3"/>

  <!-- softLimit line -->
  <line x1="695" y1="260" x2="760" y2="260" class="threshold-line" stroke="#ffd93d"/>
  <text x="690" y="264" class="threshold-label" fill="#ffd93d" text-anchor="end">softLimit</text>
  <text x="690" y="276" fill="#999" font-size="11" text-anchor="end" style="font-family:sans-serif">80% = 160K</text>

  <!-- hardLimit line -->
  <line x1="695" y1="182" x2="760" y2="182" class="threshold-line" stroke="#ff6b6b"/>
  <text x="690" y="186" class="threshold-label" fill="#ff6b6b" text-anchor="end">hardLimit</text>
  <text x="690" y="198" fill="#999" font-size="11" text-anchor="end" style="font-family:sans-serif">95% = 190K</text>

  <!-- Gauge tick marks -->
  <text x="705" y="510" fill="#555" font-size="11" text-anchor="end" style="font-family:sans-serif">0%</text>
  <text x="705" y="130" fill="#555" font-size="11" text-anchor="end" style="font-family:sans-serif">100%</text>

  <!-- Stage 1: Monitor -->
  <rect x="40" y="80" width="600" height="100" rx="10" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="50" y="90" width="200" height="80" rx="8" class="stage-box" fill="#1a1a2e" stroke="#ff6b6b"/>
  <text x="68" y="115" class="stage-title" style="fill:#ff6b6b">Stage 1: Monitor</text>
  <text x="68" y="132" class="stage-desc">Check token count after each turn</text>
  <text x="68" y="147" class="stage-desc">Compare against softLimit/hardLimit</text>
  <!-- Data bar: full width (100%) -->
  <rect x="270" y="115" width="350" height="24" class="data-bar" fill="url(#dataGrad1)" opacity="0.8"/>
  <text x="445" y="131" fill="#fff" font-size="13" font-weight="600" text-anchor="middle" style="font-family:sans-serif">175,000 tokens (87.5%)</text>
  <text x="445" y="100" fill="#999" font-size="12" text-anchor="middle" style="font-family:sans-serif">Conversation data before compression</text>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="180" x2="340" y2="200" stroke="#666" stroke-width="1.3" marker-end="url(#flowArr)"/>
  <text x="355" y="195" fill="#ff6b6b" font-size="12" style="font-family:sans-serif">exceeds softLimit</text>

  <!-- Stage 2: Slice -->
  <rect x="40" y="205" width="600" height="100" rx="10" fill="none" stroke="#ffd93d" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="50" y="215" width="200" height="80" rx="8" class="stage-box" fill="#1a1a2e" stroke="#ffd93d"/>
  <text x="68" y="240" class="stage-title" style="fill:#ffd93d">Stage 2: Slice</text>
  <text x="68" y="257" class="stage-desc">Select oldest conversation turns</text>
  <text x="68" y="272" class="stage-desc">Preserve recent context window</text>
  <!-- Data bar: 70% width -->
  <rect x="270" y="240" width="245" height="24" class="data-bar" fill="url(#dataGrad2)" opacity="0.8"/>
  <rect x="515" y="240" width="105" height="24" class="data-bar" fill="#333" opacity="0.4" stroke="#ffd93d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="393" y="256" fill="#fff" font-size="13" font-weight="600" text-anchor="middle" style="font-family:sans-serif">122K tokens</text>
  <text x="567" y="256" fill="#ffd93d" font-size="12" text-anchor="middle" style="font-family:sans-serif">sliced</text>
  <text x="445" y="225" fill="#999" font-size="12" text-anchor="middle" style="font-family:sans-serif">Oldest turns marked for summarization</text>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="305" x2="340" y2="325" stroke="#666" stroke-width="1.3" marker-end="url(#flowArr)"/>

  <!-- Stage 3: Summarize -->
  <rect x="40" y="330" width="600" height="100" rx="10" fill="none" stroke="#48bb78" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="50" y="340" width="200" height="80" rx="8" class="stage-box" fill="#1a1a2e" stroke="#48bb78"/>
  <text x="68" y="365" class="stage-title" style="fill:#48bb78">Stage 3: Summarize</text>
  <text x="68" y="382" class="stage-desc">LLM generates concise summary</text>
  <text x="68" y="397" class="stage-desc">of sliced conversation turns</text>
  <!-- Data bar: 40% width -->
  <rect x="270" y="365" width="140" height="24" class="data-bar" fill="url(#dataGrad3)" opacity="0.8"/>
  <text x="340" y="381" fill="#fff" font-size="13" font-weight="600" text-anchor="middle" style="font-family:sans-serif">70K tokens</text>
  <text x="445" y="350" fill="#999" font-size="12" text-anchor="middle" style="font-family:sans-serif">Summary replaces original turns</text>
  <!-- Compression ratio -->
  <rect x="430" y="362" width="80" height="28" rx="4" fill="#48bb78" opacity="0.15" stroke="#48bb78" stroke-width="1"/>
  <text x="470" y="380" fill="#48bb78" font-size="14" font-weight="700" text-anchor="middle" style="font-family:sans-serif">-60%</text>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="430" x2="340" y2="450" stroke="#666" stroke-width="1.3" marker-end="url(#flowArr)"/>

  <!-- Stage 4: Extract Memories -->
  <rect x="40" y="455" width="600" height="100" rx="10" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="50" y="465" width="200" height="80" rx="8" class="stage-box" fill="#1a1a2e" stroke="#00d4ff"/>
  <text x="68" y="490" class="stage-title" style="fill:#00d4ff">Stage 4: Memories</text>
  <text x="68" y="507" class="stage-desc">Extract key facts to CLAUDE.md</text>
  <text x="68" y="522" class="stage-desc">Persist across future sessions</text>
  <!-- Data bar: tiny + memory icons -->
  <rect x="270" y="488" width="140" height="24" class="data-bar" fill="url(#dataGrad4)" opacity="0.8"/>
  <text x="340" y="504" fill="#fff" font-size="13" font-weight="600" text-anchor="middle" style="font-family:sans-serif">70K tokens</text>

  <!-- Memory items -->
  <rect x="430" y="478" width="120" height="40" rx="6" fill="#0a2a3a" stroke="#00d4ff" stroke-width="1"/>
  <text x="490" y="495" fill="#00d4ff" font-size="12" font-weight="600" text-anchor="middle" style="font-family:sans-serif">CLAUDE.md</text>
  <text x="490" y="510" fill="#888" font-size="11" text-anchor="middle" style="font-family:sans-serif">+3 new memories</text>

  <!-- Final output arrow -->
  <path d="M570,498 L610,498" stroke="#00d4ff" stroke-width="1.3" marker-end="url(#flowArrActive)"/>
  <text x="590" y="490" fill="#00d4ff" font-size="11" style="font-family:sans-serif">persist</text>

  <!-- Bottom note -->
  <text x="340" y="580" fill="#555" font-size="13" text-anchor="middle" style="font-family:sans-serif">Pipeline runs automatically when context utilization exceeds softLimit (80%)</text>
</svg>